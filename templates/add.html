{% extends "base.html" %}
{% block title %}إضافة موبايل — الروضة{% endblock %}
{% block extra_styles %}
<style>
    .form-page { max-width:700px; margin:3rem auto; padding:0 1.5rem 4rem; }
    .form-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2.5rem; }
    .form-title { font-size:1.6rem; font-weight:900; margin-bottom:.5rem; }
    .form-title span { color:var(--accent); }
    .form-subtitle { color:var(--text-muted); font-size:.9rem; margin-bottom:2rem; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group.full { grid-column:1/-1; }
    label { font-size:.85rem; font-weight:700; color:var(--text-muted); }
    input,select,textarea { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-family:'Cairo',sans-serif; font-size:.9rem; outline:none; transition:border-color .2s; direction:rtl; width:100%; box-sizing:border-box; }
    input:focus,select:focus,textarea:focus { border-color:var(--accent); }
    textarea { resize:vertical; min-height:90px; }
    .form-actions { display:flex; gap:12px; margin-top:2rem; justify-content:flex-end; }
    .btn-cancel { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }

    /* ─── Upload Zone ─── */
    .upload-zone {
        border:2px dashed var(--border);
        border-radius:14px;
        padding:2rem;
        text-align:center;
        cursor:pointer;
        transition:all .3s;
        background:var(--surface2);
        position:relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
        border-color:var(--accent);
        background:rgba(240,165,0,.05);
    }
    .upload-zone input[type=file] {
        position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
    }
    .upload-icon { font-size:2.5rem; margin-bottom:.5rem; }
    .upload-text { font-weight:700; color:var(--text); margin-bottom:.3rem; }
    .upload-hint { font-size:.8rem; color:var(--text-muted); }
    .upload-count { margin-top:.5rem; font-size:.82rem; color:var(--accent); font-weight:700; }

    /* ─── Preview Grid ─── */
    .preview-grid {
        display:grid;
        grid-template-columns:repeat(auto-fill, minmax(100px,1fr));
        gap:10px;
        margin-top:1rem;
    }
    .preview-item {
        position:relative;
        border-radius:10px;
        overflow:hidden;
        aspect-ratio:1;
        background:var(--surface2);
        border:2px solid var(--border);
    }
    .preview-item img {
        width:100%; height:100%; object-fit:cover;
    }
    .preview-item .remove-btn {
        position:absolute; top:4px; right:4px;
        width:22px; height:22px;
        background:rgba(220,50,50,.9);
        border:none; border-radius:50%;
        color:#fff; font-size:13px;
        cursor:pointer; display:flex;
        align-items:center; justify-content:center;
        transition:transform .2s;
        padding:0; line-height:1;
    }
    .preview-item .remove-btn:hover { transform:scale(1.2); }
    .preview-item .main-badge {
        position:absolute; bottom:4px; right:4px;
        background:var(--accent); color:#000;
        font-size:.6rem; font-weight:800;
        padding:2px 6px; border-radius:6px;
    }
</style>
{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1 class="form-title">➕ إضافة <span>موبايل جديد</span></h1>
        <p class="form-subtitle">أضف جهاز جديد إلى مخزون الروضة</p>
        <form method="POST" enctype="multipart/form-data">
            <div class="form-grid">
                <div class="form-group full"><label>📱 اسم الجهاز *</label><input type="text" name="name" placeholder="مثال: Samsung Galaxy S24 Ultra" required></div>
                <div class="form-group"><label>🏷️ الماركة *</label>
                    <select name="brand" required>
                        <option value="">اختر الماركة</option>
                        {% for b in ['Samsung','Apple','Realme','Xiaomi','Oppo','Huawei','Vivo','Nokia','Other'] %}
                        <option value="{{ b }}">{{ b }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group"><label>✨ الحالة *</label>
                    <select name="condition" required>
                        <option value="">اختر الحالة</option>
                        <option value="new">✨ جديد</option>
                        <option value="like_new">💎 شبه جديد</option>
                        <option value="used">🔄 مستعمل</option>
                    </select>
                </div>
                <div class="form-group"><label>💰 السعر (جنيه) *</label><input type="number" name="price" placeholder="مثال: 3500" min="0" step="0.01" required></div>
                <div class="form-group"><label>🎨 اللون</label><input type="text" name="color" placeholder="أسود، أبيض، ذهبي..."></div>
                <div class="form-group"><label>💾 التخزين</label>
                    <select name="storage"><option value="">—</option>{% for s in ['32GB','64GB','128GB','256GB','512GB','1TB'] %}<option value="{{ s }}">{{ s }}</option>{% endfor %}</select>
                </div>
                <div class="form-group"><label>⚡ الرام</label>
                    <select name="ram"><option value="">—</option>{% for r in ['3GB','4GB','6GB','8GB','12GB','16GB'] %}<option value="{{ r }}">{{ r }}</option>{% endfor %}</select>
                </div>

                <!-- Upload Zone -->
                <div class="form-group full">
                    <label>🖼️ صور الجهاز (يمكنك رفع أكثر من صورة)</label>
                    <div class="upload-zone" id="uploadZone">
                        <input type="file" name="images" id="imagesInput" multiple accept="image/*">
                        <div class="upload-icon">📷</div>
                        <div class="upload-text">اضغط هنا أو اسحب الصور</div>
                        <div class="upload-hint">PNG، JPG، WEBP — حتى 10 صور</div>
                        <div class="upload-count" id="uploadCount"></div>
                    </div>
                    <div class="preview-grid" id="previewGrid"></div>
                </div>

                <div class="form-group full"><label>▶️ رابط مراجعة يوتيوب</label><input type="text" name="youtube_url" placeholder="https://youtube.com/watch?v=..."></div>
                <div class="form-group full"><label>📝 الوصف</label><textarea name="description" placeholder="اكتب وصفاً مختصراً..."></textarea></div>
            </div>
            <div class="form-actions">
                <a href="/admin/{{ token }}" class="btn btn-cancel">إلغاء</a>
                <button type="submit" class="btn btn-primary">✅ إضافة الجهاز</button>
            </div>
        </form>
    </div>
</div>

<script>
const input = document.getElementById('imagesInput');
const grid  = document.getElementById('previewGrid');
const count = document.getElementById('uploadCount');
const zone  = document.getElementById('uploadZone');
let dt = new DataTransfer();

function refresh() {
    grid.innerHTML = '';
    const files = Array.from(dt.files);
    count.textContent = files.length ? `${files.length} صورة محددة` : '';
    files.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = e => {
            const item = document.createElement('div');
            item.className = 'preview-item';
            item.innerHTML = `
                <img src="${e.target.result}" alt="">
                <button type="button" class="remove-btn" data-i="${i}">✕</button>
                ${i===0 ? '<span class="main-badge">رئيسية</span>' : ''}
            `;
            item.querySelector('.remove-btn').onclick = () => {
                const nd = new DataTransfer();
                Array.from(dt.files).forEach((f,j) => { if(j!==i) nd.items.add(f); });
                dt = nd; input.files = dt.files; refresh();
            };
            grid.appendChild(item);
        };
        reader.readAsDataURL(file);
    });
}

input.addEventListener('change', () => {
    Array.from(input.files).forEach(f => dt.items.add(f));
    input.files = dt.files;
    refresh();
});

zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    Array.from(e.dataTransfer.files).forEach(f => { if(f.type.startsWith('image/')) dt.items.add(f); });
    input.files = dt.files; refresh();
});
</script>
{% endblock %}
